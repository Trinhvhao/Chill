<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Luxury Tree Final v4 - Star Edition</title>

    <!-- GPU Optimization Meta Tags -->
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="force-rendering" content="webkit">
    <meta name="gpu-acceleration" content="enabled">
    <meta name="hardware-acceleration" content="enabled">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #0a0a1a 0%, #000000 100%);
            font-family: 'Times New Roman', serif;
            position: relative;
            /* GPU Acceleration */
            transform: translateZ(0);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            backface-visibility: hidden;
            perspective: 1000px;
        }

        /* Floating Snow Effect */
        .snowflake {
            position: absolute;
            top: -10px;
            color: white;
            font-size: 1em;
            animation: fall linear infinite;
            z-index: 5;
            pointer-events: none;
            opacity: 0.8;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Aurora Background Effect */
        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg,
                    rgba(0, 255, 150, 0.1) 0%,
                    rgba(0, 100, 255, 0.1) 25%,
                    rgba(255, 0, 150, 0.1) 50%,
                    rgba(150, 0, 255, 0.1) 75%,
                    rgba(0, 255, 150, 0.1) 100%);
            background-size: 400% 400%;
            animation: aurora 8s ease-in-out infinite;
            z-index: 2;
            pointer-events: none;
            opacity: 0.3;
        }

        @keyframes aurora {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        /* Floating Particles */
        .magic-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, #ffd700, transparent);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
            z-index: 3;
            pointer-events: none;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
                opacity: 0;
            }

            10%,
            90% {
                opacity: 1;
            }

            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            /* GPU Layer Promotion */
            transform: translateZ(0);
            will-change: transform;
            contain: layout style paint;
        }

        /* UI Overlay - Minimalist */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            box-sizing: border-box;
            transition: opacity 0.5s ease;
        }

        /* When hidden class is applied */
        .ui-hidden {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Loading */
        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-out;
        }

        .loader-text {
            color: #d4af37;
            font-size: 14px;
            letter-spacing: 4px;
            margin-top: 20px;
            text-transform: uppercase;
            font-weight: 100;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-top: 1px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Typography - Centerpiece */
        h1 {
            color: #fceea7;
            font-size: 56px;
            margin: 0;
            font-weight: 400;
            letter-spacing: 6px;
            text-shadow:
                0 0 20px rgba(255, 215, 0, 0.8),
                0 0 40px rgba(255, 215, 0, 0.6),
                0 0 60px rgba(255, 215, 0, 0.4),
                0 0 80px rgba(255, 215, 0, 0.2);
            background: linear-gradient(45deg, #fff, #ffd700, #ff6b6b, #4ecdc4, #ffd700, #fff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Cinzel', 'Times New Roman', serif;
            opacity: 0.95;
            transition: opacity 0.5s ease;
            animation: titleGlow 3s ease-in-out infinite, gradientShift 5s ease infinite;
            will-change: filter, background-position;
            position: relative;
        }

        h1::before {
            content: 'Merry Christmas';
            position: absolute;
            left: 0;
            top: 0;
            background: linear-gradient(45deg, #fff, #ffd700, #eebb66);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: blur(10px);
            opacity: 0.5;
            z-index: -1;
        }

        @keyframes titleGlow {

            0%,
            100% {
                filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
            }

            50% {
                filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.9)) drop-shadow(0 0 60px rgba(255, 100, 100, 0.5));
            }
        }

        @keyframes gradientShift {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        /* Upload Button - Top Right */
        .upload-wrapper {
            position: absolute;
            top: 30px;
            right: 30px;
            pointer-events: auto;
            text-align: right;
            transition: opacity 0.5s ease;
            z-index: 20;
        }

        .upload-btn {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: #d4af37;
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 10px;
            transition: all 0.4s;
            display: inline-block;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }

        .upload-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .upload-btn:hover::before {
            left: 100%;
        }

        .upload-btn:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5), 0 0 40px rgba(212, 175, 55, 0.3);
            transform: translateY(-2px);
        }

        .upload-btn:active {
            transform: translateY(0px);
        }

        .hint-text {
            color: rgba(212, 175, 55, 0.5);
            font-size: 9px;
            margin-top: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.6;
        }

        #file-input {
            display: none;
        }

        /* Christmas Card Overlay - Perfect Centering */
        #christmas-card {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 500px;
            height: fit-content;
            max-width: 90vw;
            max-height: 90vh;
            margin: auto;
            background: linear-gradient(135deg, #1a0000 0%, #0d1b2a 50%, #1a0000 100%);
            border: 3px solid #d4af37;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(212, 175, 55, 0.3);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
            text-align: center;
            /* Perfect centering with flexbox */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Prevent any layout issues */
            box-sizing: border-box;
            overflow-y: auto;
            /* Backup centering method */
            transform: none;
        }

        #christmas-card.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* Fallback centering for older browsers */
        @supports not (display: flex) {
            #christmas-card {
                position: fixed !important;
                top: 50% !important;
                left: 50% !important;
                transform: translate(-50%, -50%) !important;
                margin: 0 !important;
            }
        }

        /* Force centering on all screen sizes */
        @media screen {
            #christmas-card {
                /* Ensure it's always centered */
                inset: 0;
                margin: auto;
                position: fixed;
            }
        }

        .card-title {
            font-family: 'Cinzel', serif;
            font-size: 36px;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        .card-message {
            font-size: 16px;
            color: #ffeebb;
            line-height: 1.8;
            margin-bottom: 25px;
            font-style: italic;
        }

        .card-close {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .card-close:hover {
            background: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        /* Music Control */
        #music-control {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(20, 20, 20, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            animation: musicPulse 2s ease-in-out infinite;
        }

        @keyframes musicPulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(212, 175, 55, 0);
            }
        }

        #music-control:hover {
            background: rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            animation: musicPulse 1s ease-in-out infinite;
        }

        #music-control svg {
            width: 24px;
            height: 24px;
            fill: #d4af37;
            transition: all 0.3s;
        }

        #music-control:hover svg {
            fill: #ffd700;
            transform: scale(1.1);
        }

        /* --- Webcam feedback (左下角) --- */
        #webcam-wrapper {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 280px;
            height: 210px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
            border-radius: 4px;
            overflow: hidden;
            opacity: 1;
            pointer-events: none;
            z-index: 50;
            background: #000;
            transition: opacity 0.5s ease;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
                letter-spacing: 3px;
            }

            .upload-wrapper {
                top: 15px;
                right: 15px;
            }

            .upload-btn {
                padding: 8px 15px;
                font-size: 8px;
            }

            #webcam-wrapper {
                width: 180px;
                height: 135px;
                bottom: 15px;
                left: 15px;
            }

            #christmas-card {
                width: 90vw;
                max-width: 90vw;
                max-height: 85vh;
                padding: 25px;
                /* Force centering on mobile */
                position: fixed !important;
                top: 50% !important;
                left: 50% !important;
                right: auto !important;
                bottom: auto !important;
                transform: translate(-50%, -50%) !important;
                margin: 0 !important;
                /* Prevent overflow on small screens */
                overflow-y: auto;
            }

            .card-title {
                font-size: 24px;
            }

            #music-control {
                width: 40px;
                height: 40px;
                bottom: 20px;
                right: 20px;
            }

            #music-control svg {
                width: 18px;
                height: 18px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 28px;
                letter-spacing: 2px;
            }

            .hint-text {
                font-size: 7px;
            }

            #webcam-wrapper {
                width: 120px;
                height: 90px;
            }

            #christmas-card {
                width: 95vw;
                max-width: 95vw;
                max-height: 80vh;
                padding: 20px;
                /* Extra centering for very small screens */
                position: fixed !important;
                top: 50% !important;
                left: 50% !important;
                right: auto !important;
                bottom: auto !important;
                transform: translate(-50%, -50%) !important;
                margin: 0 !important;
                left: 50% !important;
                transform: translate(-50%, -50%) !important;
                border-radius: 10px;
            }

            .card-title {
                font-size: 20px;
                margin-bottom: 15px;
            }

            .card-message {
                font-size: 14px;
                line-height: 1.6;
                margin-bottom: 20px;
            }

            .card-close {
                padding: 10px 20px;
                font-size: 11px;
            }
        }

        /* A30 GPU Performance optimizations */
        .snowflake,
        .magic-particle {
            will-change: transform, opacity;
            transform: translateZ(0);
            /* Force GPU layer */
            backface-visibility: hidden;
            perspective: 1000px;
        }

        /* Optimize animations for GPU */
        @keyframes fall {
            0% {
                transform: translate3d(0, -100vh, 0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translate3d(0, 100vh, 0) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translate3d(0, 0, 0) rotate(0deg);
                opacity: 0;
            }

            10%,
            90% {
                opacity: 1;
            }

            50% {
                transform: translate3d(0, -20px, 0) rotate(180deg);
            }
        }

        /* GPU-accelerated aurora */
        .aurora {
            will-change: background-position;
            transform: translateZ(0);
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }

            .snowflake,
            .magic-particle {
                display: none;
            }
        }

        /* Focus states for accessibility */
        .upload-btn:focus-visible,
        .card-close:focus-visible,
        #music-control:focus-visible {
            outline: 2px solid #ffd700;
            outline-offset: 3px;
        }

        /* High contrast mode support */
        @media (prefers-contrast: high) {
            h1 {
                text-shadow: none;
                background: #ffd700;
                -webkit-background-clip: text;
                background-clip: text;
            }

            .upload-btn {
                border-width: 2px;
            }
        }
    </style>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm"
            }
        }
    </script>
</head>

<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading Holiday Magic</div>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <h1>Merry Christmas</h1>

        <div class="upload-wrapper">
            <label class="upload-btn">
                Add Memories
                <input type="file" id="file-input" multiple accept="image/*">
            </label>
            <div class="hint-text">
                Press 'H' to Hide Controls<br>
                Drag to Rotate • Scroll to Zoom<br>
                Press 'R' for Auto-Rotate
            </div>
        </div>
    </div>

    <div id="webcam-wrapper">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="webcam-preview" style="display:none;"></canvas>
    </div>

    <!-- Christmas Card -->
    <div id="christmas-card">
        <div class="card-title">🎄 Merry Christmas 🎄</div>
        <div class="card-message">
            Wishing you joy, peace, and happiness<br>
            this holiday season and throughout<br>
            the coming year.<br><br>
            May your days be merry and bright! ✨
        </div>
        <button class="card-close" id="card-close-btn">Close</button>
    </div>

    <!-- Music Control -->
    <div id="music-control" title="Toggle Music">
        <svg id="music-icon-play" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z" />
        </svg>
        <svg id="music-icon-pause" viewBox="0 0 24 24" style="display:none;">
            <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z" />
        </svg>
    </div>

    <!-- Background Music -->
    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/11/22/audio_0c647a443c.mp3" type="audio/mpeg">
    </audio>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
        import { FilesetResolver, HandLandmarker } from '@mediapipe/tasks-vision';

        // --- CONFIGURATION ---
        // Auto-detect GPU capability and optimize accordingly
        const GPU_INFO = {
            isHighEnd: navigator.hardwareConcurrency >= 8,
            hasWebGL2: !!document.createElement('canvas').getContext('webgl2'),
            memoryGB: navigator.deviceMemory || 4
        };

        const CONFIG = {
            colors: {
                bg: 0x0a0a1a,
                champagneGold: 0xffd966,
                deepGreen: 0x03180a,
                accentRed: 0xff0033,
                glowBlue: 0x4488ff,
                glowPurple: 0xaa44ff
            },
            particles: {
                // Optimized for A30 GPU - High performance settings
                count: GPU_INFO.isHighEnd ? 2000 : 1200,
                dustCount: GPU_INFO.isHighEnd ? 3000 : 2000,
                treeHeight: 24,
                treeRadius: 8
            },
            camera: {
                z: 50
            },
            performance: {
                // A30 GPU optimizations
                maxPixelRatio: GPU_INFO.isHighEnd ? 2.0 : 1.5,
                enableBloom: true,
                bloomResolution: GPU_INFO.isHighEnd ? 1.0 : 0.75,
                shadowMapSize: GPU_INFO.isHighEnd ? 2048 : 1024,
                antialias: GPU_INFO.isHighEnd,
                enableFog: true,
                maxLights: GPU_INFO.isHighEnd ? 8 : 6
            }
        };

        const STATE = {
            mode: 'INTRO', // Start with intro animation
            focusIndex: -1,
            focusTarget: null,
            hand: { detected: false, x: 0, y: 0 },
            rotation: { x: 0, y: 0 },
            introProgress: 0 // 0 to 1 for intro animation
        };

        let scene, camera, renderer, composer;
        let mainGroup;
        let clock = new THREE.Clock();
        let particleSystem = [];
        let photoMeshGroup = new THREE.Group();
        let handLandmarker, video, webcamCanvas, webcamCtx;
        let caneTexture;
        let controls; // OrbitControls for mouse interaction
        let starField; // Background stars

        async function init() {
            initThree();
            setupEnvironment();
            setupLights();
            createTextures();
            createStarField(); // Add twinkling stars
            createParticles();
            createDust();
            createDefaultPhotos();
            setupPostProcessing();
            setupMouseControls(); // Add mouse controls
            setupEvents();
            await initMediaPipe();

            const loader = document.getElementById('loader');
            loader.style.opacity = 0;
            setTimeout(() => loader.remove(), 800);

            animate();
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(CONFIG.colors.bg);

            if (CONFIG.performance.enableFog) {
                scene.fog = new THREE.FogExp2(CONFIG.colors.bg, 0.01);
            }

            camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, CONFIG.camera.z);

            // A30 GPU Optimized WebGL Context
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl2', {
                alpha: false,
                antialias: CONFIG.performance.antialias,
                powerPreference: 'high-performance',
                stencil: false,
                depth: true,
                premultipliedAlpha: false,
                preserveDrawingBuffer: false,
                failIfMajorPerformanceCaveat: false,
                desynchronized: true // Reduce input latency
            });

            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                context: gl,
                antialias: CONFIG.performance.antialias,
                alpha: false,
                powerPreference: 'high-performance',
                stencil: false,
                depth: true,
                logarithmicDepthBuffer: false,
                precision: 'highp'
            });

            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, CONFIG.performance.maxPixelRatio));
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 2.2;

            // Additional A30 optimizations
            renderer.sortObjects = false; // Disable sorting for performance
            renderer.autoClearStencil = false;
            renderer.shadowMap.enabled = false; // Disable shadows for better performance
            renderer.outputColorSpace = THREE.SRGBColorSpace;

            container.appendChild(renderer.domElement);

            mainGroup = new THREE.Group();
            mainGroup.matrixAutoUpdate = true; // Enable for animations
            scene.add(mainGroup);

            console.log('🚀 GPU Optimized Renderer initialized');
            console.log('GPU Info:', renderer.info);
        }

        function createStarField() {
            const starCount = 800;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(starCount * 3);
            const colors = new Float32Array(starCount * 3);
            const sizes = new Float32Array(starCount);
            const phases = new Float32Array(starCount); // For twinkling

            for (let i = 0; i < starCount; i++) {
                const i3 = i * 3;

                // Random position in a sphere
                const radius = 100 + Math.random() * 100;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = radius * Math.cos(phi);

                // Random colors (white, blue-white, yellow-white)
                const colorChoice = Math.random();
                if (colorChoice < 0.7) {
                    colors[i3] = 1.0;
                    colors[i3 + 1] = 1.0;
                    colors[i3 + 2] = 1.0;
                } else if (colorChoice < 0.85) {
                    colors[i3] = 0.8;
                    colors[i3 + 1] = 0.9;
                    colors[i3 + 2] = 1.0;
                } else {
                    colors[i3] = 1.0;
                    colors[i3 + 1] = 1.0;
                    colors[i3 + 2] = 0.8;
                }

                sizes[i] = Math.random() * 2 + 0.5;
                phases[i] = Math.random() * Math.PI * 2; // Random phase for twinkling
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('phase', new THREE.BufferAttribute(phases, 1));

            const material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 }
                },
                vertexShader: `
                    attribute float size;
                    attribute float phase;
                    attribute vec3 color;
                    varying vec3 vColor;
                    varying float vAlpha;
                    uniform float time;

                    void main() {
                        vColor = color;
                        
                        // Twinkling effect
                        float twinkle = sin(time * 2.0 + phase) * 0.5 + 0.5;
                        vAlpha = 0.3 + twinkle * 0.7;
                        
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * (300.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    varying float vAlpha;

                    void main() {
                        // Circular star shape
                        float dist = length(gl_PointCoord - vec2(0.5));
                        if (dist > 0.5) discard;
                        
                        float alpha = (1.0 - dist * 2.0) * vAlpha;
                        gl_FragColor = vec4(vColor, alpha);
                    }
                `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });

            starField = new THREE.Points(geometry, material);
            scene.add(starField);
        }

        class Particle {
            constructor(mesh, type, isDust = false) {
                this.mesh = mesh;
                this.type = type;
                this.isDust = isDust;

                this.posTree = new THREE.Vector3();
                this.posScatter = new THREE.Vector3();
                this.posIntro = new THREE.Vector3(); // Starting position for intro
                this.baseScale = mesh.scale.x;

                // Individual Spin Speed
                const speedMult = (type === 'PHOTO') ? 0.3 : 2.0;

                this.spinSpeed = new THREE.Vector3(
                    (Math.random() - 0.5) * speedMult,
                    (Math.random() - 0.5) * speedMult,
                    (Math.random() - 0.5) * speedMult
                );

                // Intro animation parameters
                this.introSide = Math.random() > 0.5 ? 1 : -1; // Left or right wave
                this.introDelay = Math.random() * 0.3; // Stagger effect
                this.introSpeed = 0.8 + Math.random() * 0.4;

                this.calculatePositions();
            }

            calculatePositions() {
                // 如果是照片，位置由 updatePhotoLayout 统一管理，这里只做初始化
                if (this.type === 'PHOTO') {
                    this.posTree.set(0, 0, 0);
                    // 初始化Scatter位置
                    const rScatter = 8 + Math.random() * 12;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    this.posScatter.set(
                        rScatter * Math.sin(phi) * Math.cos(theta),
                        rScatter * Math.sin(phi) * Math.sin(theta),
                        rScatter * Math.cos(phi)
                    );

                    // Intro position - off screen on sides
                    this.posIntro.set(
                        this.introSide * (30 + Math.random() * 20),
                        -20 + Math.random() * 40,
                        -10 + Math.random() * 20
                    );
                    return;
                }

                // TREE: Tight Spiral for normal particles
                const h = CONFIG.particles.treeHeight;
                const halfH = h / 2;
                let t = Math.random();
                t = Math.pow(t, 0.8);
                const y = (t * h) - halfH;

                let rMax = CONFIG.particles.treeRadius * (1.0 - t);
                if (rMax < 0.5) rMax = 0.5;

                const angle = t * 50 * Math.PI + Math.random() * Math.PI;
                const r = rMax * (0.8 + Math.random() * 0.4);
                this.posTree.set(Math.cos(angle) * r, y, Math.sin(angle) * r);

                // SCATTER: 3D Sphere
                let rScatter = this.isDust ? (12 + Math.random() * 20) : (8 + Math.random() * 12);
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                this.posScatter.set(
                    rScatter * Math.sin(phi) * Math.cos(theta),
                    rScatter * Math.sin(phi) * Math.sin(theta),
                    rScatter * Math.cos(phi)
                );

                // INTRO: Start position off-screen on left or right
                this.posIntro.set(
                    this.introSide * (30 + Math.random() * 20),
                    -20 + Math.random() * 40,
                    -10 + Math.random() * 20
                );
            }

            update(dt, mode, focusTargetMesh, introProgress = 1) {
                let target = this.posTree;

                if (mode === 'INTRO') {
                    // Animated intro with wave effect
                    const adjustedProgress = Math.max(0, Math.min(1, (introProgress - this.introDelay) * this.introSpeed));
                    const eased = this.easeInOutCubic(adjustedProgress);

                    // Create wavy path from intro position to tree position
                    const waveAmplitude = 15 * (1 - eased); // Wave decreases as it approaches
                    const waveFrequency = 3;
                    const waveOffset = Math.sin(eased * Math.PI * waveFrequency) * waveAmplitude * this.introSide;

                    target = new THREE.Vector3(
                        THREE.MathUtils.lerp(this.posIntro.x, this.posTree.x, eased) + waveOffset,
                        THREE.MathUtils.lerp(this.posIntro.y, this.posTree.y, eased),
                        THREE.MathUtils.lerp(this.posIntro.z, this.posTree.z, eased)
                    );

                    this.mesh.position.copy(target);

                    // Rotate during intro
                    this.mesh.rotation.x += this.spinSpeed.x * dt * 3;
                    this.mesh.rotation.y += this.spinSpeed.y * dt * 3;
                    this.mesh.rotation.z += this.spinSpeed.z * dt * 3;

                    // Scale up during intro
                    const s = this.baseScale * eased;
                    this.mesh.scale.set(s, s, s);
                    return;
                }

                if (mode === 'SCATTER') {
                    target = this.posScatter;
                } else if (mode === 'FOCUS') {
                    if (this.mesh === focusTargetMesh) {
                        // Position photo in front of camera, centered
                        const desiredWorldPos = new THREE.Vector3(0, 2, 35);
                        const invMatrix = new THREE.Matrix4().copy(mainGroup.matrixWorld).invert();
                        target = desiredWorldPos.applyMatrix4(invMatrix);
                    } else {
                        target = this.posScatter;
                    }
                }

                // Movement Easing
                const lerpSpeed = (mode === 'FOCUS' && this.mesh === focusTargetMesh) ? 5.0 : 2.0;
                this.mesh.position.lerp(target, lerpSpeed * dt);

                // Rotation Logic
                if (mode === 'SCATTER') {
                    this.mesh.rotation.x += this.spinSpeed.x * dt;
                    this.mesh.rotation.y += this.spinSpeed.y * dt;
                    this.mesh.rotation.z += this.spinSpeed.z * dt;
                } else if (mode === 'TREE') {
                    // Keep photos facing outward
                    if (this.type === 'PHOTO') {
                        this.mesh.lookAt(0, this.mesh.position.y, 0);
                        this.mesh.rotateY(Math.PI);
                    } else {
                        // Normal particles rotate
                        this.mesh.rotation.x = THREE.MathUtils.lerp(this.mesh.rotation.x, 0, dt);
                        this.mesh.rotation.z = THREE.MathUtils.lerp(this.mesh.rotation.z, 0, dt);
                        this.mesh.rotation.y += 0.5 * dt;
                    }
                } else if (mode === 'FOCUS') {
                    if (this.mesh === focusTargetMesh) {
                        // Face camera directly
                        this.mesh.lookAt(camera.position);
                    }
                }

                // Scale Logic
                let s = this.baseScale;
                if (this.isDust) {
                    s = this.baseScale * (0.8 + 0.4 * Math.sin(clock.elapsedTime * 4 + this.mesh.id));
                    if (mode === 'TREE') s = 0;
                } else if (mode === 'SCATTER' && this.type === 'PHOTO') {
                    s = this.baseScale * 2.5;
                } else if (mode === 'FOCUS') {
                    if (this.mesh === focusTargetMesh) s = 4.5;
                    else s = this.baseScale * 0.8;
                }

                this.mesh.scale.lerp(new THREE.Vector3(s, s, s), 4 * dt);
            }

            easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }
        }

        // --- 核心新功能：更新照片螺旋布局 ---
        function updatePhotoLayout() {
            const photos = particleSystem.filter(p => p.type === 'PHOTO');
            const count = photos.length;
            if (count === 0) return;

            // 螺旋参数
            const h = CONFIG.particles.treeHeight * 0.9; // 使用树高的90%，避免太靠顶或底
            const bottomY = -h / 2;
            const stepY = h / count; // 垂直间距
            const loops = 3; // 缠绕圈数

            photos.forEach((p, i) => {
                // 1. 垂直高度：均匀分布
                const y = bottomY + stepY * i + stepY / 2; // 居中于每一格

                // 2. 计算当前高度在树整体中的比例 (0 = 底, 1 = 顶)
                const fullH = CONFIG.particles.treeHeight;
                const normalizedH = (y + fullH / 2) / fullH;

                // 3. 计算树在该高度的半径
                let rMax = CONFIG.particles.treeRadius * (1.0 - normalizedH);
                if (rMax < 1.0) rMax = 1.0;

                // 4. 设置照片半径（比树半径大一点，悬浮效果）
                const r = rMax + 3.0;

                // 5. 计算螺旋角度
                // normalizedH * Math.PI * 2 * loops -> 随高度增加角度
                // Math.PI/4 -> 初始角度偏移，美观用
                const angle = normalizedH * Math.PI * 2 * loops + (Math.PI / 4);

                p.posTree.set(Math.cos(angle) * r, y, Math.sin(angle) * r);
            });
        }

        // --- CREATION ---
        function createParticles() {
            const sphereGeo = new THREE.SphereGeometry(0.5, 32, 32);
            const boxGeo = new THREE.BoxGeometry(0.55, 0.55, 0.55);
            const curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, -0.5, 0), new THREE.Vector3(0, 0.3, 0),
                new THREE.Vector3(0.1, 0.5, 0), new THREE.Vector3(0.3, 0.4, 0)
            ]);
            const candyGeo = new THREE.TubeGeometry(curve, 16, 0.08, 8, false);

            // Heart shape geometry
            const heartShape = new THREE.Shape();
            heartShape.moveTo(0, 0.25);
            heartShape.bezierCurveTo(0, 0.25, 0, 0.5, 0.25, 0.5);
            heartShape.bezierCurveTo(0.5, 0.5, 0.5, 0.25, 0.5, 0);
            heartShape.bezierCurveTo(0.5, -0.25, 0.25, -0.5, 0, -0.75);
            heartShape.bezierCurveTo(-0.25, -0.5, -0.5, -0.25, -0.5, 0);
            heartShape.bezierCurveTo(-0.5, 0.25, -0.5, 0.5, -0.25, 0.5);
            heartShape.bezierCurveTo(0, 0.5, 0, 0.25, 0, 0.25);
            const heartGeo = new THREE.ExtrudeGeometry(heartShape, {
                depth: 0.2,
                bevelEnabled: true,
                bevelThickness: 0.05,
                bevelSize: 0.05,
                bevelSegments: 3
            });
            heartGeo.center();
            heartGeo.scale(0.6, 0.6, 0.6);

            // Gift box geometry (box with ribbon)
            const giftBoxGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
            const ribbonGeo = new THREE.BoxGeometry(0.65, 0.1, 0.1);

            const goldMat = new THREE.MeshStandardMaterial({
                color: CONFIG.colors.champagneGold,
                metalness: 1.0,
                roughness: 0.1,
                envMapIntensity: 2.0,
                emissive: 0x664400,
                emissiveIntensity: 0.3
            });

            const greenMat = new THREE.MeshStandardMaterial({
                color: CONFIG.colors.deepGreen,
                metalness: 0.3,
                roughness: 0.7,
                emissive: 0x004411,
                emissiveIntensity: 0.25
            });

            const redMat = new THREE.MeshPhysicalMaterial({
                color: CONFIG.colors.accentRed,
                metalness: 0.4,
                roughness: 0.2,
                clearcoat: 1.0,
                emissive: 0x660011,
                emissiveIntensity: 0.35,
                transmission: 0.1,
                thickness: 0.5
            });

            const candyMat = new THREE.MeshStandardMaterial({ map: caneTexture, roughness: 0.4 });

            // Heart material - pink/red with glow
            const heartMat = new THREE.MeshStandardMaterial({
                color: 0xff1493,
                metalness: 0.3,
                roughness: 0.3,
                emissive: 0xff0066,
                emissiveIntensity: 0.5
            });

            // Gift box materials
            const giftRedMat = new THREE.MeshStandardMaterial({
                color: 0xcc0000,
                metalness: 0.2,
                roughness: 0.6,
                emissive: 0x330000,
                emissiveIntensity: 0.2
            });

            const giftGreenMat = new THREE.MeshStandardMaterial({
                color: 0x00aa00,
                metalness: 0.2,
                roughness: 0.6,
                emissive: 0x002200,
                emissiveIntensity: 0.2
            });

            const ribbonMat = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                metalness: 0.8,
                roughness: 0.2
            });

            for (let i = 0; i < CONFIG.particles.count; i++) {
                const rand = Math.random();
                let mesh, type;

                if (rand < 0.30) {
                    mesh = new THREE.Mesh(boxGeo, greenMat);
                    type = 'BOX';
                } else if (rand < 0.55) {
                    mesh = new THREE.Mesh(boxGeo, goldMat);
                    type = 'GOLD_BOX';
                } else if (rand < 0.75) {
                    mesh = new THREE.Mesh(sphereGeo, goldMat);
                    type = 'GOLD_SPHERE';
                } else if (rand < 0.82) {
                    mesh = new THREE.Mesh(sphereGeo, redMat);
                    type = 'RED';
                } else if (rand < 0.88) {
                    mesh = new THREE.Mesh(candyGeo, candyMat);
                    type = 'CANE';
                } else if (rand < 0.94) {
                    // Heart
                    mesh = new THREE.Mesh(heartGeo, heartMat);
                    type = 'HEART';
                } else {
                    // Gift box with ribbon
                    const giftGroup = new THREE.Group();
                    const box = new THREE.Mesh(giftBoxGeo, Math.random() > 0.5 ? giftRedMat : giftGreenMat);
                    const ribbon1 = new THREE.Mesh(ribbonGeo, ribbonMat);
                    const ribbon2 = new THREE.Mesh(ribbonGeo, ribbonMat);
                    ribbon2.rotation.y = Math.PI / 2;
                    giftGroup.add(box);
                    giftGroup.add(ribbon1);
                    giftGroup.add(ribbon2);
                    mesh = giftGroup;
                    type = 'GIFT';
                }

                const s = 0.4 + Math.random() * 0.5;
                mesh.scale.set(s, s, s);
                mesh.rotation.set(Math.random() * 6, Math.random() * 6, Math.random() * 6);

                mainGroup.add(mesh);
                particleSystem.push(new Particle(mesh, type, false));
            }

            // --- 五角星生成逻辑 (Star Generation) ---
            const starShape = new THREE.Shape();
            const points = 5;
            const outerRadius = 1.5;
            const innerRadius = 0.7; // 调整内径以获得完美的五角星形状

            for (let i = 0; i < points * 2; i++) {
                // 计算角度，+PI/2 确保一个角朝上
                const angle = (i * Math.PI) / points + Math.PI / 2;
                const r = (i % 2 === 0) ? outerRadius : innerRadius;
                const x = Math.cos(angle) * r;
                const y = Math.sin(angle) * r;
                if (i === 0) starShape.moveTo(x, y);
                else starShape.lineTo(x, y);
            }
            starShape.closePath();

            // 使用 ExtrudeGeometry 创建有厚度的3D五角星
            const starGeo = new THREE.ExtrudeGeometry(starShape, {
                depth: 0.4,
                bevelEnabled: true,
                bevelThickness: 0.1,
                bevelSize: 0.1,
                bevelSegments: 2
            });
            starGeo.center(); // 居中几何体

            const starMat = new THREE.MeshStandardMaterial({
                color: 0xffee88,
                emissive: 0xffbb00,
                emissiveIntensity: 1.2,
                metalness: 1.0,
                roughness: 0.1
            });
            const star = new THREE.Mesh(starGeo, starMat);

            // Add point light to star for extra glow
            const starLight = new THREE.PointLight(0xffdd00, 2, 12);
            star.add(starLight);

            // 放置在树顶
            star.position.set(0, CONFIG.particles.treeHeight / 2 + 1.2, 0);
            mainGroup.add(star);
            window.star = star; // Store for animation

            mainGroup.add(photoMeshGroup);
        }

        function handleImageUpload(e) {
            const files = e.target.files;
            if (!files.length) return;
            Array.from(files).forEach(f => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    new THREE.TextureLoader().load(ev.target.result, (t) => {
                        t.colorSpace = THREE.SRGBColorSpace;
                        addPhotoToScene(t);
                    });
                }
                reader.readAsDataURL(f);
            });
        }

        // --- MEDIAPIPE ---
        async function initMediaPipe() {
            video = document.getElementById('webcam');
            webcamCanvas = document.getElementById('webcam-preview');
            webcamCtx = webcamCanvas.getContext('2d');

            webcamCanvas.width = 280;
            webcamCanvas.height = 210;

            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });

            if (navigator.mediaDevices?.getUserMedia) {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            }
        }

        let lastVideoTime = -1;
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                if (handLandmarker) {
                    const result = handLandmarker.detectForVideo(video, performance.now());
                    processGestures(result);
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        function processGestures(result) {
            if (result.landmarks && result.landmarks.length > 0) {
                STATE.hand.detected = true;
                const lm = result.landmarks[0];
                STATE.hand.x = (lm[9].x - 0.5) * 2;
                STATE.hand.y = (lm[9].y - 0.5) * 2;

                const thumb = lm[4]; const index = lm[8]; const wrist = lm[0];
                const pinchDist = Math.hypot(thumb.x - index.x, thumb.y - index.y);
                const tips = [lm[8], lm[12], lm[16], lm[20]];
                let avgDist = 0;
                tips.forEach(t => avgDist += Math.hypot(t.x - wrist.x, t.y - wrist.y));
                avgDist /= 4;

                if (pinchDist < 0.05) {
                    if (STATE.mode !== 'FOCUS') {
                        STATE.mode = 'FOCUS';
                        const photos = particleSystem.filter(p => p.type === 'PHOTO');
                        if (photos.length) STATE.focusTarget = photos[Math.floor(Math.random() * photos.length)].mesh;
                    }
                } else if (avgDist < 0.25) {
                    STATE.mode = 'TREE';
                    STATE.focusTarget = null;
                } else if (avgDist > 0.4) {
                    STATE.mode = 'SCATTER';
                    STATE.focusTarget = null;
                }
            } else {
                STATE.hand.detected = false;
            }
        }

        function setupEvents() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);

                // Re-center Christmas card on resize
                const card = document.getElementById('christmas-card');
                if (card && card.classList.contains('show')) {
                    card.style.top = '50%';
                    card.style.left = '50%';
                    card.style.transform = 'translate(-50%, -50%)';
                }
            });
            document.getElementById('file-input').addEventListener('change', handleImageUpload);

            window.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 'h') {
                    const controlsUI = document.querySelector('.upload-wrapper');
                    if (controlsUI) controlsUI.classList.toggle('ui-hidden');

                    const webcam = document.getElementById('webcam-wrapper');
                    if (webcam) webcam.classList.toggle('ui-hidden');
                }

                // Toggle auto-rotate with 'R' key
                if (e.key.toLowerCase() === 'r' && controls) {
                    controls.autoRotate = !controls.autoRotate;
                }

                // Reset camera with 'Space' key
                if (e.key === ' ' && controls) {
                    controls.reset();
                }
            });

            // Mouse interaction hints
            const hintText = document.querySelector('.hint-text');
            if (hintText) {
                hintText.innerHTML = `
                    Press 'H' to Hide Controls<br>
                    Drag to Rotate • Scroll to Zoom<br>
                    Press 'R' for Auto-Rotate
                `;
            }
        }

        // Performance monitoring
        let frameCount = 0;
        let lastFPSUpdate = 0;
        let currentFPS = 0;

        function animate() {
            requestAnimationFrame(animate);

            // Cap delta time to prevent lag spikes
            const dt = Math.min(clock.getDelta(), 0.1);
            const time = clock.elapsedTime;

            // FPS Monitoring for A30 optimization
            frameCount++;
            if (time - lastFPSUpdate > 1.0) {
                currentFPS = frameCount / (time - lastFPSUpdate);
                frameCount = 0;
                lastFPSUpdate = time;

                // Auto-adjust quality based on FPS
                if (currentFPS < 45 && CONFIG.performance.enableBloom) {
                    CONFIG.performance.bloomResolution *= 0.9;
                    console.log('🔧 Auto-reducing bloom resolution for performance');
                }
            }

            // Update star field twinkling (optimized)
            if (starField?.material?.uniforms) {
                starField.material.uniforms.time.value = time;
            }

            // Update mouse controls (cached)
            controls?.update();

            // Dynamic lighting effects - A30 optimized (reduced frequency)
            if (frameCount % 2 === 0) { // Update every other frame
                if (window.innerLight) {
                    window.innerLight.intensity = 2 + Math.sin(time * 2) * 0.5;
                    // Cycle through colors for enhanced effect
                    const colorPhase = (time * 0.3) % 5;
                    if (colorPhase < 1) {
                        window.innerLight.color.setHex(0xffaa00);
                    } else if (colorPhase < 2) {
                        window.innerLight.color.setHex(0xffffff);
                    } else if (colorPhase < 3) {
                        window.innerLight.color.setHex(0x4488ff);
                    } else if (colorPhase < 4) {
                        window.innerLight.color.setHex(0xaa44ff);
                    } else {
                        window.innerLight.color.setHex(0xff3366);
                    }
                }

                if (window.spotBlue) {
                    window.spotBlue.intensity = 600 + Math.sin(time * 1.5) * 150;
                }

                if (window.spotPurple) {
                    window.spotPurple.intensity = 500 + Math.cos(time * 1.8) * 120;
                }

                if (window.spotRed) {
                    window.spotRed.intensity = 450 + Math.sin(time * 2.2) * 100;
                }
            }

            // Animate star rotation and glow
            if (window.star) {
                window.star.rotation.z = time * 0.5;
                window.star.rotation.y = time * 0.3;
            }

            // Dynamic bloom effect - more subtle
            if (window.bloomPass) {
                window.bloomPass.strength = 1.2 + Math.sin(time * 0.8) * 0.15;
            }

            // Handle intro animation
            if (STATE.mode === 'INTRO') {
                STATE.introProgress += dt * 0.5; // Takes ~2 seconds
                if (STATE.introProgress >= 1.5) {
                    STATE.mode = 'TREE';
                    STATE.introProgress = 1;
                }
                // Gentle rotation during intro
                mainGroup.rotation.y = time * 0.2;
            } else {
                // Rotation Logic - only apply if not using mouse controls
                if (STATE.mode === 'SCATTER' && STATE.hand.detected) {
                    const targetRotY = STATE.hand.x * Math.PI * 0.9;
                    const targetRotX = STATE.hand.y * Math.PI * 0.25;
                    STATE.rotation.y += (targetRotY - STATE.rotation.y) * 3.0 * dt;
                    STATE.rotation.x += (targetRotX - STATE.rotation.x) * 3.0 * dt;
                    mainGroup.rotation.y = STATE.rotation.y;
                    mainGroup.rotation.x = STATE.rotation.x;
                } else if (!controls || !controls.enabled) {
                    // Only auto-rotate if mouse controls are disabled
                    if (STATE.mode === 'TREE') {
                        STATE.rotation.y += 0.3 * dt;
                        STATE.rotation.x += (0 - STATE.rotation.x) * 2.0 * dt;
                    } else {
                        STATE.rotation.y += 0.1 * dt;
                    }
                    mainGroup.rotation.y = STATE.rotation.y;
                    mainGroup.rotation.x = STATE.rotation.x;
                }
            }

            particleSystem.forEach(p => p.update(dt, STATE.mode, STATE.focusTarget, STATE.introProgress));
            composer.render();
        }

        // Music control functions
        let musicPlaying = false;
        const bgMusic = document.getElementById('bg-music');
        const playIcon = document.getElementById('music-icon-play');
        const pauseIcon = document.getElementById('music-icon-pause');
        const musicControl = document.getElementById('music-control');

        function toggleMusic() {
            if (musicPlaying) {
                bgMusic.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            } else {
                bgMusic.play().catch(e => console.log('Music play failed:', e));
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            }
            musicPlaying = !musicPlaying;
        }

        // Add event listener for music control
        musicControl.addEventListener('click', toggleMusic);

        // Auto-play music after user interaction
        let musicInitialized = false;
        document.addEventListener('click', function initMusic() {
            if (!musicInitialized) {
                bgMusic.play().catch(e => console.log('Auto-play failed:', e));
                musicPlaying = true;
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                musicInitialized = true;
            }
        }, { once: true });

        // Christmas card functions
        const christmasCard = document.getElementById('christmas-card');
        const cardCloseBtn = document.getElementById('card-close-btn');

        function showCard() {
            // Force perfect centering
            const card = document.getElementById('christmas-card');
            if (card) {
                // Reset any potential positioning issues
                card.style.position = 'fixed';
                card.style.top = '50%';
                card.style.left = '50%';
                card.style.right = 'auto';
                card.style.bottom = 'auto';
                card.style.transform = 'translate(-50%, -50%)';
                card.style.margin = '0';

                // Ensure it's above everything
                card.style.zIndex = '9999';

                // Show the card
                card.classList.add('show');

                console.log('🎄 Christmas card centered and shown');
            }
        }

        function closeCard() {
            christmasCard.classList.remove('show');
            // Start intro animation when card is closed
            STATE.mode = 'INTRO';
            STATE.introProgress = 0;
        }

        // Add event listener for close button
        cardCloseBtn.addEventListener('click', closeCard);

        // Show card after loading completes
        setTimeout(showCard, 2000);

        // ===== THÊM CÁC HIỆU ỨNG MỚI =====

        // 1. Tạo hiệu ứng tuyết rơi
        function createSnowEffect() {
            const snowflakes = ['❄', '❅', '❆', '✻', '✼', '❋'];

            function createSnowflake() {
                const snowflake = document.createElement('div');
                snowflake.className = 'snowflake';
                snowflake.innerHTML = snowflakes[Math.floor(Math.random() * snowflakes.length)];
                snowflake.style.left = Math.random() * 100 + '%';
                snowflake.style.animationDuration = Math.random() * 3 + 2 + 's';
                snowflake.style.opacity = Math.random();
                snowflake.style.fontSize = Math.random() * 10 + 10 + 'px';

                document.body.appendChild(snowflake);

                setTimeout(() => {
                    snowflake.remove();
                }, 5000);
            }

            // Tạo tuyết rơi liên tục
            setInterval(createSnowflake, 300);
        }

        // 2. Tạo hiệu ứng aurora background
        function createAuroraEffect() {
            const aurora = document.createElement('div');
            aurora.className = 'aurora';
            document.body.appendChild(aurora);
        }

        // 3. Tạo các hạt ma thuật bay lơ lửng
        function createMagicParticles() {
            function createParticle() {
                const particle = document.createElement('div');
                particle.className = 'magic-particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';

                // Random colors
                const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.background = `radial-gradient(circle, ${color}, transparent)`;

                document.body.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 6000);
            }

            // Tạo hạt ma thuật liên tục
            setInterval(createParticle, 800);
        }

        // 4. Hiệu ứng cursor trail
        function createCursorTrail() {
            const trail = [];
            const trailLength = 20;

            document.addEventListener('mousemove', (e) => {
                const dot = document.createElement('div');
                dot.style.position = 'fixed';
                dot.style.left = e.clientX + 'px';
                dot.style.top = e.clientY + 'px';
                dot.style.width = '4px';
                dot.style.height = '4px';
                dot.style.background = '#ffd700';
                dot.style.borderRadius = '50%';
                dot.style.pointerEvents = 'none';
                dot.style.zIndex = '1000';
                dot.style.transition = 'all 0.5s ease-out';

                document.body.appendChild(dot);
                trail.push(dot);

                if (trail.length > trailLength) {
                    const oldDot = trail.shift();
                    oldDot.remove();
                }

                setTimeout(() => {
                    dot.style.opacity = '0';
                    dot.style.transform = 'scale(0)';
                }, 100);

                setTimeout(() => {
                    if (dot.parentNode) dot.remove();
                }, 600);
            });
        }

        // 5. Hiệu ứng click ripple
        function createClickRipple() {
            document.addEventListener('click', (e) => {
                const ripple = document.createElement('div');
                ripple.style.position = 'fixed';
                ripple.style.left = e.clientX + 'px';
                ripple.style.top = e.clientY + 'px';
                ripple.style.width = '0px';
                ripple.style.height = '0px';
                ripple.style.background = 'radial-gradient(circle, rgba(255, 215, 0, 0.6), transparent)';
                ripple.style.borderRadius = '50%';
                ripple.style.pointerEvents = 'none';
                ripple.style.zIndex = '999';
                ripple.style.transform = 'translate(-50%, -50%)';
                ripple.style.transition = 'all 0.6s ease-out';

                document.body.appendChild(ripple);

                setTimeout(() => {
                    ripple.style.width = '100px';
                    ripple.style.height = '100px';
                    ripple.style.opacity = '0';
                }, 10);

                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        }

        // 6. Hiệu ứng keyboard glow
        function createKeyboardEffects() {
            document.addEventListener('keydown', (e) => {
                if (e.key.toLowerCase() === 'r') {
                    // Tạo hiệu ứng flash khi nhấn R
                    const flash = document.createElement('div');
                    flash.style.position = 'fixed';
                    flash.style.top = '0';
                    flash.style.left = '0';
                    flash.style.width = '100%';
                    flash.style.height = '100%';
                    flash.style.background = 'rgba(255, 215, 0, 0.1)';
                    flash.style.pointerEvents = 'none';
                    flash.style.zIndex = '998';
                    flash.style.transition = 'opacity 0.3s ease-out';

                    document.body.appendChild(flash);

                    setTimeout(() => {
                        flash.style.opacity = '0';
                    }, 50);

                    setTimeout(() => {
                        flash.remove();
                    }, 350);
                }
            });
        }

        // Khởi tạo tất cả hiệu ứng
        function initAllEffects() {
            createSnowEffect();
            createAuroraEffect();
            createMagicParticles();
            createCursorTrail();
            createClickRipple();
            createKeyboardEffects();
        }

        // A30 GPU Performance Monitor
        function setupPerformanceMonitor() {
            // Add performance stats to console
            setInterval(() => {
                if (renderer && renderer.info) {
                    console.log('🚀 A30 Performance Stats:', {
                        FPS: Math.round(currentFPS),
                        'Draw Calls': renderer.info.render.calls,
                        'Triangles': renderer.info.render.triangles,
                        'Geometries': renderer.info.memory.geometries,
                        'Textures': renderer.info.memory.textures,
                        'GPU Memory': `${(renderer.info.memory.geometries + renderer.info.memory.textures)} objects`
                    });
                }
            }, 5000); // Every 5 seconds

            // Expose performance controls to console
            window.GPU_CONTROLS = {
                setParticleCount: (count) => {
                    CONFIG.particles.count = count;
                    console.log(`🔧 Particle count set to: ${count}`);
                },
                toggleBloom: () => {
                    CONFIG.performance.enableBloom = !CONFIG.performance.enableBloom;
                    console.log(`🌟 Bloom ${CONFIG.performance.enableBloom ? 'enabled' : 'disabled'}`);
                },
                setPixelRatio: (ratio) => {
                    renderer.setPixelRatio(ratio);
                    console.log(`📱 Pixel ratio set to: ${ratio}`);
                },
                getCurrentFPS: () => currentFPS,
                getGPUInfo: () => renderer.info
            };

            console.log('🎮 A30 GPU Controls available in window.GPU_CONTROLS');
            console.log('Example: GPU_CONTROLS.setParticleCount(1000)');
        }

        // Khởi tạo hiệu ứng sau khi DOM loaded
        document.addEventListener('DOMContentLoaded', () => {
            initAllEffects();
            setupPerformanceMonitor();
        });

        // Display GPU info on startup
        console.log('🚀 Christmas Tree Pro - A30 GPU Optimized');
        console.log('GPU Detection:', GPU_INFO);
        console.log('Config:', CONFIG);

        init();
    </script>
