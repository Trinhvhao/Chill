<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>Celestial Heart</title>
    <meta name="description" content="A 3D Heart Particle Experience" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
      body, html { 
        margin: 0; 
        padding: 0; 
        height: 100%; 
        overflow: hidden; 
        background-color: #050505; 
      }
      #root { 
        width: 100%; 
        height: 100%; 
        position: fixed;
        top: 0;
        left: 0;
      }
      .font-handwriting { font-family: 'Great Vibes', cursive; }
      .font-sans-serif { font-family: 'Montserrat', sans-serif; }
      
      /* Prevent flash of white */
      canvas {
        display: block;
        background-color: #050105 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
